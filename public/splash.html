<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
<title>GS Center</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #050508;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #c8d6e5;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    -webkit-app-region: drag;
    user-select: none;
  }

  /* ── Animated background grid ── */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridPulse 4s ease-in-out infinite;
  }
  @keyframes gridPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }

  /* ── Radial glow behind logo ── */
  .glow-orb {
    position: fixed; z-index: 1;
    width: 400px; height: 400px;
    top: 50%; left: 50%; transform: translate(-50%, -55%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,255,136,0.08) 0%, rgba(0,200,255,0.04) 40%, transparent 70%);
    animation: orbPulse 3s ease-in-out infinite;
    filter: blur(40px);
  }
  @keyframes orbPulse {
    0%, 100% { transform: translate(-50%, -55%) scale(1); opacity: 0.7; }
    50% { transform: translate(-50%, -55%) scale(1.15); opacity: 1; }
  }

  /* ── Scanning line ── */
  .scan-line {
    position: fixed; z-index: 2; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(0,255,136,0.3) 30%, rgba(0,255,136,0.6) 50%, rgba(0,255,136,0.3) 70%, transparent 100%);
    animation: scanDown 3s linear infinite;
    box-shadow: 0 0 15px rgba(0,255,136,0.2), 0 0 40px rgba(0,255,136,0.1);
  }
  @keyframes scanDown {
    0% { top: -2px; }
    100% { top: 100%; }
  }

  /* ── Main content ── */
  .splash-content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center; gap: 28px;
  }

  /* ── Logo container ── */
  .logo-wrap {
    position: relative;
    width: 88px; height: 88px;
    display: flex; align-items: center; justify-content: center;
  }

  /* Outer ring */
  .logo-ring {
    position: absolute; inset: -10px;
    border-radius: 50%;
    border: 1.5px solid transparent;
    border-top-color: rgba(0,255,136,0.6);
    border-right-color: rgba(0,200,255,0.3);
    animation: ringRotate 2.5s linear infinite;
  }
  .logo-ring-2 {
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 1px solid transparent;
    border-bottom-color: rgba(0,255,136,0.3);
    border-left-color: rgba(0,200,255,0.15);
    animation: ringRotate 3.5s linear infinite reverse;
  }
  @keyframes ringRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Inner icon */
  .logo-icon {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    animation: logoBreath 2.5s ease-in-out infinite;
  }
  .logo-icon svg {
    width: 38px; height: 38px;
    filter: drop-shadow(0 0 12px rgba(0,255,136,0.3));
  }
  @keyframes logoBreath {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.06); opacity: 1; }
  }

  /* ── Title ── */
  .splash-title {
    font-size: 16px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    background: linear-gradient(135deg, #00ff88 0%, #00c8ff 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none;
  }

  /* ── HUD Status Block (Mind-Blowing Tech Design) ── */
  .hud-status {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    width: 280px; position: relative; margin-top: -6px;
  }

  /* Top micro details */
  .hud-top-bar {
    width: 100%; display: flex; justify-content: space-between; align-items: flex-end;
    padding: 0 4px;
  }
  .hud-hex {
    font-size: 8px; font-family: monospace; color: rgba(0,200,255,0.7);
    letter-spacing: 1px;
    text-shadow: 0 0 5px rgba(0,200,255,0.4);
  }
  .hud-dots { display: flex; gap: 3px; margin-bottom: 2px; }
  .hud-dots span {
    width: 4px; height: 4px; background: rgba(0,255,136,0.2);
    animation: dotPulse 1.5s infinite; border-radius: 1px;
  }
  .hud-dots span:nth-child(2) { animation-delay: 0.2s; }
  .hud-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse {
    0%, 100% { background: rgba(0,255,136,0.2); box-shadow: none; }
    50% { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
  }

  /* Main Angled Container */
  .splash-status-wrap {
    width: 100%; height: 32px; position: relative; display: flex; align-items: center;
    background: rgba(0, 255, 136, 0.04);
    border: 1px solid rgba(0, 255, 136, 0.3);
    clip-path: polygon(0 8px, 8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%);
    box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.05);
  }
  .splash-status-wrap::before {
    content: ''; position: absolute; inset: 0;
    background-image: linear-gradient(90deg, rgba(0,255,136,0.08) 1px, transparent 1px);
    background-size: 4px 100%; pointer-events: none; z-index: 0;
  }
  .splash-status-wrap::after {
    content: ''; position: absolute; top: 0; bottom: 0; left: -20px; width: 40px;
    background: linear-gradient(90deg, transparent, rgba(0,255,136,0.6), transparent);
    animation: digitalScan 2s infinite linear; z-index: 1;
    mix-blend-mode: overlay;
  }
  @keyframes digitalScan { 0% { left: -40px; } 100% { left: 100%; } }

  /* Blinking Square Marker */
  .status-marker {
    width: 6px; height: 6px; background: #00ff88;
    margin-left: 14px; margin-right: 12px;
    box-shadow: 0 0 8px #00ff88;
    animation: markerBlink 0.8s infinite steps(2); z-index: 2;
  }
  @keyframes markerBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }

  /* Status Text */
  .splash-status {
    flex: 1;
    font-size: 10.5px; font-family: 'Consolas', 'Courier New', monospace;
    letter-spacing: 2.2px; text-transform: uppercase;
    color: #e0f8e8; text-shadow: 0 0 6px rgba(0,255,136,0.6);
    z-index: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Bottom micro details */
  .hud-bottom-bar {
    width: 100%; display: flex; justify-content: space-between; align-items: flex-start;
    padding: 0 4px;
  }
  .hud-line {
    flex: 1; height: 1px; background: rgba(0,255,136,0.25);
    margin-top: 4px; margin-right: 12px; position: relative;
  }
  .hud-line::after {
    content: ''; position: absolute; right: 0; top: -1px; width: 14px; height: 3px;
    background: #00ff88; box-shadow: 0 0 5px #00ff88;
  }
  .hud-sys {
    font-size: 8px; font-family: monospace; color: rgba(0,255,136,0.4); letter-spacing: 1.5px;
  }

  /* ── Progress bar ── */
  .progress-track {
    width: 220px; height: 2px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #00ff88, #00c8ff);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 0 10px rgba(0,255,136,0.4);
  }
  .progress-glow {
    position: absolute; top: -3px; height: 8px; width: 30px; right: 0;
    background: radial-gradient(ellipse, rgba(0,255,136,0.4), transparent);
    border-radius: 50%;
    animation: progressGlow 1.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes progressGlow {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ── Corner accents ── */
  .corner { position: fixed; z-index: 5; width: 24px; height: 24px; }
  .corner--tl { top: 12px; left: 12px; border-top: 1.5px solid rgba(0,255,136,0.2); border-left: 1.5px solid rgba(0,255,136,0.2); }
  .corner--tr { top: 12px; right: 12px; border-top: 1.5px solid rgba(0,255,136,0.2); border-right: 1.5px solid rgba(0,255,136,0.2); }
  .corner--bl { bottom: 12px; left: 12px; border-bottom: 1.5px solid rgba(0,255,136,0.2); border-left: 1.5px solid rgba(0,255,136,0.2); }
  .corner--br { bottom: 12px; right: 12px; border-bottom: 1.5px solid rgba(0,255,136,0.2); border-right: 1.5px solid rgba(0,255,136,0.2); }

  /* ── Particle dots ── */
  .particles {
    position: fixed; inset: 0; z-index: 3; overflow: hidden; pointer-events: none;
  }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: rgba(0,255,136,0.4);
    border-radius: 50%;
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-120px) scale(0.5); opacity: 0; }
  }

  /* ── Version tag ── */
  .version {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 10;
    font-size: 10.5px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(0,255,136,0.7);
    background: rgba(0,255,136,0.06);
    border: 1px solid rgba(0,255,136,0.12);
    padding: 4px 14px;
    border-radius: 20px;
    backdrop-filter: blur(6px);
    text-shadow: 0 0 8px rgba(0,255,136,0.25);
  }

  /* ── Fade-out on finish ── */
  .fade-out {
    animation: fadeOut 0.5s ease-out forwards;
  }
  @keyframes fadeOut {
    to { opacity: 0; transform: scale(1.02); }
  }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-orb"></div>
  <div class="scan-line"></div>

  <div class="particles" id="particles"></div>

  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="splash-content" id="content">
    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <div class="logo-ring-2"></div>
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:#00ff88">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
    </div>

    <div class="splash-title">GS Center</div>

    <div class="hud-status">
      <div class="hud-top-bar">
        <span class="hud-hex" id="hudHex">0x00A1</span>
        <div class="hud-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="splash-status-wrap">
        <div class="status-marker"></div>
        <div class="splash-status" id="status">Initializing...</div>
      </div>
      <div class="hud-bottom-bar">
        <div class="hud-line"></div>
        <span class="hud-sys">SYS.CORE</span>
      </div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
      <div class="progress-glow"></div>
    </div>
  </div>

  <div class="version" id="versionTag">Loading...</div>

  <script>
    // Generate floating particles
    const particlesEl = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = (40 + Math.random() * 50) + '%';
      p.style.animationDelay = (Math.random() * 6) + 's';
      p.style.animationDuration = (4 + Math.random() * 4) + 's';
      p.style.width = p.style.height = (1.5 + Math.random() * 2) + 'px';
      particlesEl.appendChild(p);
    }

    // Tech HUD Hex glitch effect
    const hexEl = document.getElementById('hudHex');
    setInterval(() => {
      const hex = Math.floor(Math.random() * 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
      hexEl.textContent = '0x' + hex;
    }, 70);

    // IPC listener for progress updates from main process
    const { ipcRenderer } = require('electron');

    // Receive app version from main process
    ipcRenderer.on('splash:version', (_e, v) => {
      document.getElementById('versionTag').textContent = 'v' + (v || '1.0.0');
    });

    ipcRenderer.on('splash:status', (_e, msg) => {
      document.getElementById('status').textContent = msg;
    });

    ipcRenderer.on('splash:progress', (_e, pct) => {
      document.getElementById('progressFill').style.width = Math.min(pct, 100) + '%';
    });

    ipcRenderer.on('splash:done', () => {
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('status').textContent = 'Ready';
      setTimeout(() => {
        document.getElementById('content').classList.add('fade-out');
      }, 300);
    });
  </script>
</body>
</html>
